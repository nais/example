name: Deploy app
on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/deploy-app.yaml"

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - uses: actions/checkout@v6
      - name: Build and push to GAR
        id: docker-build-push
        uses: nais/docker-build-push@v0
        with:
          team: nais
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: nais/setup@v1
      - name: Deploy to dev-gcp
        run: nais alpha apply .nais/app.yaml --team nais --environment dev-gcp --set spec.image="${{ needs.build.outputs.image }}" --wait
      - name: Deploy to prod-gcp
        run: nais alpha apply .nais/app.yaml --team nais --environment prod-gcp --set spec.image="${{ needs.build.outputs.image }}" --wait
