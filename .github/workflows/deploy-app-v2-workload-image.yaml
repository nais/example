name: Deploy app (v2 with WORKLOAD_IMAGE)
on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".nais/app-v2-wi.yaml"
      - ".github/workflows/deploy-app-v2-workload-image.yaml"

jobs:
  build_and_deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine what to do
        id: changed-files
        uses: nais/what-changed@main
        with:
          files: .nais/app-v2-wi.yaml
      - name: Build and push image
        if: steps.changed-files.outputs.changed != 'only-inputs'
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: nais
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
      - name: Deploy to dev-gcp
        uses: nais/deploy/actions/deploy@deploy-v3
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/app-v2-wi.yaml
          WORKLOAD_IMAGE: ${{ steps.docker-build-push.outputs.image }}
