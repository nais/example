apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: nais-example-v2
  namespace: nais
  labels:
    team: nais
spec:
  image: {{image}}
  replicas:
    min: 1
    max: 1
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
  liveness:
    path: /healthz
  readiness:
    path: /healthz
  envFrom:
    - configmap: example
